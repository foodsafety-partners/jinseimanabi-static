    <script>
        function filterCat(cat) {
            const cards = document.querySelectorAll('.article-card');
            const buttons = document.querySelectorAll('.category-filter button');
            buttons.forEach(b => {
                b.classList.remove('active');
                if (cat === 'all' && b.textContent === 'すべて') b.classList.add('active');
                else if (b.textContent.includes(cat)) b.classList.add('active');
            });
            cards.forEach(card => {
                if (cat === 'all') {
                    card.style.display = '';
                } else {
                    const catLinks = card.querySelectorAll('.cat a');
                    const match = [...catLinks].some(a => a.textContent === cat);
                    card.style.display = match ? '' : 'none';
                }
            });
            // Scroll to articles
            document.querySelector('.latest-articles').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
